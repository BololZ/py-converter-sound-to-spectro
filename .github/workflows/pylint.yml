name: Pylint

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '**.py'
      - 'pyproject.toml'
  pull_request:
    branches: [ main ]
    paths:
      - '**.py'
      - 'pyproject.toml'

permissions:
  contents: read # access to check out code and install dependencies

jobs:
  lint:
    runs-on: [ "self-hosted" ]
    steps:
    - uses: actions/checkout@v6
      with:
          ref: ${{ github.ref }}
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        cache: 'poetry'
        cache-dependency-path: 'pyproject.toml'
    - name: Install dependencies
      run: |
        poetry install --no-root --with dev
    - name: Analysing the code with pylint
      run: |
        poetry run pylint $(git ls-files '*.py') -v
